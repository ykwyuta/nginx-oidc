worker_processes  1;

# Load the dynamic module
load_module /app/objs/ngx_http_oidc_module.so;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Must specify cookie secret to avoid warnings and ensure consistency across workers
    oidc_cookie_secret "test-secret-key-1234567890";

    server {
        listen       8080;
        server_name  localhost;

        # OIDC Discovery endpoint
        location = /_oidc_discovery {
            internal;
            proxy_pass $oidc_discovery_url;
        }

        # OIDC JWKS endpoint
        location = /_oidc_jwks {
            internal;
            proxy_pass $oidc_jwks_url;
        }

        # OIDC Token endpoint
        location = /_oidc_token {
            internal;
            proxy_pass http://127.0.0.1:3000/token;
            proxy_method POST;
            proxy_set_header Content-Type "application/x-www-form-urlencoded";
            proxy_set_body $args;
            # Prevent NGINX from appending query parameters to the URI since we are sending them in the body
            proxy_set_header Content-Length "";
        }

        # Userinfo Endpoint
        location = /_oidc_userinfo {
            internal;
            proxy_pass $oidc_userinfo_url;
            proxy_set_header Authorization "Bearer $arg_token";
        }

        # Protected resource
        location / {
            auth_oidc          on;
            oidc_provider      "http://127.0.0.1:3000";
            oidc_client_id     "test-client-id";
            oidc_client_secret "test-client-secret";
            oidc_redirect_uri  "/callback";
            oidc_scope         "openid profile email";
            oidc_use_userinfo  on;

            # Echo claims for testing
            proxy_pass http://127.0.0.1:8080/backend;
            proxy_set_header X-User-Sub   $oidc_claim_sub;
            proxy_set_header X-User-Email $oidc_claim_email;
            proxy_set_header X-User-Name  $oidc_claim_name;
            proxy_set_header X-User-Groups $oidc_claim_groups;
            proxy_set_header X-Tenant-Id  $oidc_claim_tenant_id;
        }

        # Mock backend that returns headers as JSON
        location /backend {
            internal;
            default_type application/json;
            return 200 '{"sub":"$http_x_user_sub","email":"$http_x_user_email","name":"$http_x_user_name","groups":"$http_x_user_groups","tenant_id":"$http_x_tenant_id"}';
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
